<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pomodoro Timer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app">
    
    <!-- LEFT: TIMER -->
    <div class="container">
      <h1>Pomodoro Timer</h1>

      <!-- MODE SELECTOR -->
      <select id="modeSelect" onchange="changeMode()">
        <option value="work" selected>Work</option>
        <option value="short">Short Break</option>
        <option value="long">Long Break</option>
      </select>

      <div id="mode">Mode: WORK</div>
      <div id="timer">25:00</div>

      <div class="buttons">
        <button onclick="startTimer()">Start</button>
        <button onclick="pauseTimer()">Pause</button>
        <button onclick="resetTimer()">Reset</button>
      </div>
    </div>

    <!-- RIGHT: STATS -->
    <div class="stats">
      <h2>Total Stats</h2>
      <p>🧠 Work: <span id="workCount">0</span></p>
      <p>☕ Short: <span id="shortCount">0</span></p>
      <p>🌙 Long: <span id="longCount">0</span></p>

      <hr>

      <h2>This Session</h2>
      <p>🧠 Work: <span id="sessionWork">0</span></p>
      <p>☕ Short: <span id="sessionShort">0</span></p>
      <p>🌙 Long: <span id="sessionLong">0</span></p>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
